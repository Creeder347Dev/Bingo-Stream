<!DOCTYPE html><html><head><link rel='stylesheet' href='admin.css'></head><body><div class='card'><input type='password' id='password'><button onclick='login()'>Login</button></div><script>async function login(){const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:password.value})});const d=await r.json();localStorage.setItem('token',d.token);location.href='/editor.html';}</script></body></html>
