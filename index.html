<!DOCTYPE html>
<html>
<head>
  <title>Bingo Stream</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      overflow: hidden;

      background: url("dayflite_Illust_Full.png") no-repeat center center fixed;
      background-size: cover;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: -1;
    }

    h1 {
      text-align: center;
      color: #00ffcc;
      margin-top: 20px;
    }

    /* WRAPPER SCALE */
    #scale-wrapper {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform-origin: bottom center;
    }

    /* BASE DESIGN FIXE */
    .container {
      width: 800px;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .cell {
      width: 150px;
      height: 150px;

      border: 2px solid #00ffcc;
      background: rgba(34, 34, 34, 0.85);
      backdrop-filter: blur(3px);
      cursor: pointer;

      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;

      padding: 8px;
      overflow: hidden;
    }

    .cell span {
      width: 100%;
      line-height: 1.1;
      word-break: break-word;
    }

    .cell.checked {
      background: #00ffcc;
      color: black;
      font-weight: bold;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      background: #00ffcc;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .bingo-win {
      animation: glow 0.8s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #00ffcc; }
      to { text-shadow: 0 0 30px #00ffcc; }
    }
  </style>
</head>

<body>

<h1>Bingo du Chat 🎯</h1>

<div id="scale-wrapper">
  <div class="container">
    <h3 id="status"></h3>
    <div class="grid" id="grid"></div>
    <button onclick="resetGrid()">Reset</button>
  </div>
</div>

<script>
let phrases = [
  "C’est quoi ton setup ?",
  "Vous faites quoi ce soir ?",
  "C'est qui le grand ? (Rito)",
  "C'est quoi l'animal avec vous ? (Koubai)",
  "Rire Meli",
  "Tu stream quand ?",
  "C’est quoi ta config ?",
  "Comment on devient Vtuber ?",
  "C’est quoi la musique ?",
  "C'est quoi le jeux ?",
  "Vous êtes en couple?",
  "C'est quoi Poopoush ?",
  "Vous êtes trois ?",
  "Comment ont met la musique ?",
  "Tu fais des collabs ?",
  "Tu regarde quel anime ?",
  "La POUTRE !",
  "Vous jouez à quoi ?",
  "TITREUX !",
  "Pourquoi ça lag ?",
  "Hazbin Hôtel/The amazing digital circus ?",
  "C’est quoi ton modèle ?",
  "C'est quoi ton logiciel pour le Vtubing ?",
  "C’est quoi votre Discord ?",
  "Pourquoi il-y-a pas de titre?"
];

const grid = document.getElementById("grid");
let cells = [];

function generateGrid() {
  grid.innerHTML = "";
  cells = [];

  phrases.sort(() => Math.random() - 0.5);

  phrases.forEach(text => {
    let div = document.createElement("div");
    div.className = "cell";

    let span = document.createElement("span");
    span.innerText = text;

    div.appendChild(span);

    div.onclick = () => {
      div.classList.toggle("checked");
      checkBingo();
    };

    grid.appendChild(div);
    cells.push(div);
  });

  setTimeout(setUniformTextSize, 50);
}

function setUniformTextSize() {
  let size = 10;
  let fits;

  do {
    size++;
    fits = true;

    cells.forEach(cell => {
      const span = cell.querySelector("span");
      span.style.fontSize = size + "px";

      if (
        span.scrollHeight > cell.clientHeight ||
        span.scrollWidth > cell.clientWidth
      ) {
        fits = false;
      }
    });

  } while (fits && size < 100);

  const finalSize = size - 1;

  cells.forEach(cell => {
    cell.querySelector("span").style.fontSize = finalSize + "px";
  });
}

function adjustScale() {
  const wrapper = document.getElementById("scale-wrapper");

  const baseWidth = 800;
  const baseHeight = 900;

  const scaleX = window.innerWidth / baseWidth;
  const scaleY = window.innerHeight / baseHeight;

  const scale = Math.min(scaleX, scaleY);

  wrapper.style.transform = `translateX(-50%) scale(${scale})`;
}

window.addEventListener("resize", () => {
  adjustScale();
  setUniformTextSize();
});

window.addEventListener("load", () => {
  generateGrid();
  adjustScale();
});

function checkBingo() {
  let win = false;

  for (let i = 0; i < 5; i++) {
    if (cells.slice(i*5, i*5+5).every(c => c.classList.contains("checked"))) win = true;
  }

  for (let i = 0; i < 5; i++) {
    if ([0,1,2,3,4].every(j => cells[i + j*5].classList.contains("checked"))) win = true;
  }

  if ([0,6,12,18,24].every(i => cells[i].classList.contains("checked"))) win = true;
  if ([4,8,12,16,20].every(i => cells[i].classList.contains("checked"))) win = true;

  const status = document.getElementById("status");

  if (win) {
    status.innerText = "🔥 BINGO !!! 🔥";
    status.classList.add("bingo-win");
  } else {
    status.innerText = "";
    status.classList.remove("bingo-win");
  }
}

function resetGrid() {
  generateGrid();
  document.getElementById("status").innerText = "";
  document.getElementById("status").classList.remove("bingo-win");
}
</script>

</body>
</html>
